spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: user-authentication
            uri: http://localhost:9090
            predicates:
              - Path=/user/**
          - id: subscription
            uri: http://localhost:7070
            predicates:
              - Path=/entitlement/**,/plan/**,/subscription/**
            filters:
              - name: JwtAuthenticationFilter
          - id: content
            uri: http://localhost:8090
            predicates:
              - Path=/asset/**,/varsions/**,/titles/**,/categories/**

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
  endpoint:
    gateway:
      enabled: true